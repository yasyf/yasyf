# Renders the contribution-graph snake (light + dark) to the `output` branch.
# The README references the SVGs via raw.githubusercontent.com output-branch
# URLs inside a <picture> block.
name: Generate snake animation

on:
  schedule:
    - cron: "28 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # snk's github-dark palette draws level-1 days nearly black; these are
          # GitHub's own dark-theme level colors, so light days stay visible
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&color_snake=#a371f7

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
