name: Latest blog posts
on:
  schedule:
    - cron: "23 8 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://musings.yasyf.com/rss/"
          max_post_count: 5
