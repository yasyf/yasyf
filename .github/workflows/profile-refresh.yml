# Re-renders the marker-delimited README sections from live GitHub data using
# the committed updater. GITHUB_TOKEN commits never retrigger workflows, so
# this cannot loop.
name: Refresh profile README

on:
  schedule:
    - cron: "33 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh marker sections
        run: python3 .github/scripts/update_profile.py update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh profile README sections"
            git push
          fi
