# Opt-in daily Claude refresh (--with claude): installs the gh-profile plugin
# fresh from the cc-skills marketplace each run and runs /gh-profile:refresh —
# Claude summarizes recent commits and releases into the activity/shipped
# lines and refreshes prose when activity warrants it. The canonical
# instructions live in the skill (github.com/yasyf/cc-skills), so updating the
# skill updates every profile repo; this file is a thin shim. The mechanical
# 6-hourly refresh owns the numbers (marker interiors); this pass owns the
# words. Drop the schedule to weekly if daily runs cost more than you like.
# Requires: gh secret set ANTHROPIC_API_KEY -R <login>/<login>
name: Claude profile refresh

on:
  schedule:
    - cron: "39 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh summaries and prose
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          plugin_marketplaces: |
            https://github.com/yasyf/cc-skills.git
          plugins: |
            gh-profile@skills
          prompt: /gh-profile:refresh
          claude_args: --max-turns 50 --allowedTools "Read,Edit,Write,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(python3:*),Bash(date:*)"
